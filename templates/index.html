<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🩺 Healthcare AI Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Chat Container */
.chat-container {
    width: 420px;
    height: 650px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Header */
.chat-header {
    background: #0077ff;
    color: white;
    padding: 18px;
    font-size: 20px;
    text-align: center;
    font-weight: bold;
}

/* Chat Messages */
.chat-box {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #f5f7fb;
}

/* User Message */
.user {
    align-self: flex-end;
    background: #0077ff;
    color: white;
    padding: 10px 14px;
    border-radius: 15px 15px 0 15px;
    max-width: 75%;
    animation: fadeIn 0.3s ease-in-out;
}

/* Bot Message */
.bot {
    align-self: flex-start;
    background: #e4e6eb;
    color: #333;
    padding: 10px 14px;
    border-radius: 15px 15px 15px 0;
    max-width: 75%;
    animation: fadeIn 0.3s ease-in-out;
}

/* Input Area */
.input-area {
    display: flex;
    padding: 12px;
    border-top: 1px solid #ddd;
    background: white;
}

.input-area input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 14px;
}

.input-area button {
    margin-left: 10px;
    padding: 10px 16px;
    border: none;
    border-radius: 20px;
    background: #0077ff;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.input-area button:hover {
    background: #005edb;
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Scrollbar */
.chat-box::-webkit-scrollbar {
    width: 6px;
}
.chat-box::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">
        🩺 Healthcare AI Assistant
    </div>

    <div class="chat-box" id="chatbox">
        <div class="bot">
            Hello! I am your Healthcare Assistant. How can I support your health today?
        </div>
    </div>

    <div class="input-area">
        <input id="userInput" type="text" placeholder="Type your message..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value.trim();

    if (message === "") return;

    let chatBox = document.getElementById("chatbox");

    // Add user message
    chatBox.innerHTML += `<div class="user">${message}</div>`;
    input.value = "";

    chatBox.scrollTop = chatBox.scrollHeight;

    fetch("/get", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "msg=" + encodeURIComponent(message)
    })
    .then(response => response.json())
    .then(data => {
        chatBox.innerHTML += `<div class="bot">${data.reply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    })
    .catch(error => {
        chatBox.innerHTML += `<div class="bot">⚠️ Error connecting to server.</div>`;
    });
}

function handleKey(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
}
</script>

</body>
</html>
